name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check .

  backend-tests:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run unit tests with coverage
        run: pytest tests/unit/ -x -q --tb=short --no-cov
        env:
          DATABASE_BACKEND: sqlite
          OPENAI_API_KEY: test-key
          ANTHROPIC_API_KEY: test-key

      - name: Run API endpoint tests
        run: pytest tests/api/ -v --tb=short --no-cov
        env:
          DATABASE_BACKEND: sqlite
          OPENAI_API_KEY: test-key
          ANTHROPIC_API_KEY: test-key
          SECURITY_MODE: development

      - name: Run security tests
        run: pytest tests/security/ -v --tb=short --no-cov
        env:
          DATABASE_BACKEND: sqlite
          OPENAI_API_KEY: test-key
          ANTHROPIC_API_KEY: test-key

      - name: Run core module tests
        run: pytest tests/core/ -v --tb=short --no-cov
        env:
          DATABASE_BACKEND: sqlite
          OPENAI_API_KEY: test-key
          ANTHROPIC_API_KEY: test-key

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short --no-cov
        continue-on-error: true
        env:
          DATABASE_BACKEND: sqlite
          OPENAI_API_KEY: test-key
          ANTHROPIC_API_KEY: test-key

      - name: Coverage report
        if: matrix.python-version == '3.11'
        run: |
          pytest tests/unit/ tests/api/ tests/security/ tests/core/ \
            --cov=core --cov=core_v2 --cov=api \
            --cov-report=xml --cov-report=term-missing \
            -q --tb=short
        env:
          DATABASE_BACKEND: sqlite
          OPENAI_API_KEY: test-key
          ANTHROPIC_API_KEY: test-key

      - name: Upload coverage
        if: matrix.python-version == '3.11' && github.event_name == 'push'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  frontend-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci || npm install

      - name: Run tests
        working-directory: frontend
        run: npx vitest run

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit
        continue-on-error: true
