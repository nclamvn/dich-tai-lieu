<!DOCTYPE html>
<html lang="{{ language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        {{ custom_css }}
    </style>
</head>
<body class="template-{{ template_name }}">
    {% if title or author or date %}
    <header class="document-header">
        {% if title %}<h1 class="doc-title">{{ title }}</h1>{% endif %}
        {% if author %}<p class="doc-author">{{ author }}</p>{% endif %}
        {% if date %}<p class="doc-date">{{ date }}</p>{% endif %}
    </header>
    {% endif %}

    <main class="content">
        {{ content | safe }}
    </main>
</body>
</html>
