# =============================================================================
# AI Publisher Pro — Docker Compose (Production)
# Usage: docker compose up -d
# =============================================================================

services:
  # --- Backend (FastAPI) ---
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aipub-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - SECURITY_MODE=${SECURITY_MODE:-production}
    volumes:
      - app-data:/app/data
      - app-outputs:/app/outputs
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # --- Frontend (Next.js) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "http://backend:3000"
    container_name: aipub-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3001}:3001"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:3000
    depends_on:
      backend:
        condition: service_healthy

  # --- Redis (optional — enable with: docker compose --profile cache up -d) ---
  redis:
    image: redis:7-alpine
    container_name: aipub-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - cache

  # --- Nginx reverse proxy (optional — enable with: docker compose --profile ssl up -d) ---
  nginx:
    image: nginx:alpine
    container_name: aipub-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      backend:
        condition: service_healthy
    profiles:
      - ssl

volumes:
  app-data:
  app-outputs:
  redis-data:
